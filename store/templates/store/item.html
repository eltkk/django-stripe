<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f6f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 480px;
            width: 100%;
        }
        h1 { font-size: 1.8rem; color: #1a1f36; margin-bottom: 12px; }
        .description { color: #697386; line-height: 1.6; margin-bottom: 24px; }
        .price { font-size: 2rem; font-weight: 700; color: #1a1f36; margin-bottom: 32px; }
        .buy-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #635bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .buy-btn:hover { background: #4f46e5; }
        .buy-btn:disabled { background: #a5a1fc; cursor: not-allowed; }
        .error { color: #df1b41; margin-top: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ item.name }}</h1>
        <p class="description">{{ item.description }}</p>
        <p class="price">${{ item.price }}</p>
        <button class="buy-btn" id="buy-btn">Buy Now</button>
        <p class="error" id="error-msg"></p>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('{{ stripe_public_key }}');

        document.getElementById('buy-btn').addEventListener('click', async () => {
            const btn = document.getElementById('buy-btn');
            const errorMsg = document.getElementById('error-msg');

            btn.disabled = true;
            btn.textContent = 'Processing...';
            errorMsg.textContent = '';

            try {
                const response = await fetch('/buy/{{ item.id }}/');
                const data = await response.json();

                if (data.session_id) {
                    await stripe.redirectToCheckout({ sessionId: data.session_id });
                } else {
                    throw new Error('No session ID received');
                }
            } catch (err) {
                errorMsg.textContent = 'Payment failed. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Buy Now';
            }
        });
    </script>
</body>
</html>
